version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kisansetu_db
    environment:
      POSTGRES_USER: kisan_admin
      POSTGRES_PASSWORD: kisan_password
      POSTGRES_DB: kisansetu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data:z

  api_gateway:
    build:
      context: ./backend/api_gateway
      dockerfile: Dockerfile
    container_name: kisansetu_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/api_gateway:/app:z
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://kisan_admin:kisan_password@db:5432/kisansetu
      - DISEASE_MODEL_PATH=/app/assets/models/kisansetu_v38.tflite
    depends_on:
      - db
      - redis

  # IVR Voice Gateway Service
  ivr_engine:
    build:
      context: ./ivr_engine
      dockerfile: Dockerfile
    container_name: kisansetu_ivr
    ports:
      - "8001:8001"
    environment:
      - IVR_PROVIDER=twilio
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - AFRICASTALKING_USERNAME=${AFRICASTALKING_USERNAME:-}
      - AFRICASTALKING_API_KEY=${AFRICASTALKING_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/google_cloud.json
      - DISEASE_API_URL=http://api_gateway:8000/api/v1/disease
      - DATABASE_URL=postgresql://kisan_admin:kisan_password@db:5432/kisansetu
    depends_on:
      - db
      - redis
    volumes:
      - ./ivr_engine:/app:z

  # Redis for IVR session management
  redis:
    image: redis:7-alpine
    container_name: kisansetu_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data:z

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: kisansetu_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_gateway
      - ivr_engine

volumes:
  pgdata:
  redisdata: